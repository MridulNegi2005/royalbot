server:
  port: 2333
  address: 0.0.0.0

lavalink:
  server:
    password: "youshallnotpass"
    sources:
      youtube: false  # Handled by the youtube-plugin below
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false
    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    youtubePlaylistLoadLimit: 6
    playerUpdateInterval: 5
    youtubeSearchEnabled: true
    soundcloudSearchEnabled: true
    gc-warnings: true

  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.11.5"
      repository: "https://maven.lavalink.dev/releases"
      snapshot: false
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.4.3"
      repository: "https://maven.lavalink.dev/releases"
      snapshot: false

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    clients:
      - MUSIC
      - WEB
      - ANDROID_TESTSUITE
    # Uncomment and add your refresh token to avoid YouTube rate limits:
    # oauth:
    #   enabled: true
    #   refreshToken: "YOUR_REFRESH_TOKEN"

  lavasrc:
    providers:
      - 'ytsearch:"%ISRC%"'       # Search by ISRC for exact match
      - "ytsearch:%QUERY%"         # Fallback to YouTube search
    sources:
      spotify: true
      applemusic: false
      deezer: false
      yandexmusic: false
      flowerytts: false
      youtube: true
    spotify:
      clientId: "3a248a0a85d24b26845bb8b405bd7f20"
      clientSecret: "d2ae551458d14b2c83267ee224530713"
      countryCode: "US"
      playlistLoadLimit: 6
      albumLoadLimit: 6

logging:
  file:
    max-history: 30
    max-size: 1GB
  path: ./logs/

  level:
    root: INFO
    lavalink: INFO
